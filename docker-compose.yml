services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: lifelang
      POSTGRES_USER: lifelang
      POSTGRES_PASSWORD: lifelang
    ports:
      - "5432:5432"
    volumes:
      - lifelang-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifelang -d lifelang"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lifelang-postgres:
